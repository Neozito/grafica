<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login do painel - Gráfica do Zoinho</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div data-site-header></div>
  <main class="page">
    <section class="section">
      <div class="container login-wrap">
        <div class="login-card">
          <h1>Painel da loja</h1>
          <p>Entre com login e senha para cadastrar produtos.</p>
          <form data-admin-login-form class="stack">
            <input class="input" type="text" name="usuario" placeholder="Usuário">
            <input class="input" type="password" name="senha" placeholder="Senha">
            <button class="btn btn-primary" type="submit">Entrar</button>
            <div class="inline-help">Login padrão: <strong>admin</strong> · Senha padrão: <strong>123456</strong></div>
            <div data-login-status style="color:#dc2626;font-size:13px;font-weight:700"></div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <div data-float-whats></div>
  <script src="assets/js/products.js"></script>
</body>
</html>
